services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-tracker-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=portfolio_tracker;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: portfolio-tracker-postgres
    environment:
      POSTGRES_DB: portfolio_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - portfolio_tracker_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolio_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  portfolio_tracker_data:
